services:
  mission-control:
    build:
      context: .
      network: host
    container_name: mission-control
    network_mode: host
    user: "1000:1000"
    environment:
      - PORT=${PORT:-3007}
    env_file:
      - path: .env
        required: false
    volumes:
      - mc-data:/app/.data
      - /home/linus/.openclaw:/run/openclaw
      - /home/linus/.claude:/run/claude
      - /home/linus/.local/bin/claude:/usr/local/bin/claude:ro
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    restart: unless-stopped

volumes:
  mc-data:
